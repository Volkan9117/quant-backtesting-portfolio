# -------------------------------------------------------
#  Configuration Jekyll — GitHub Pages
#  Portfolio : Python pour la Finance de Marché
# -------------------------------------------------------

# --- Informations du site ---
title: "Python pour la Finance de Marché"
description: "Portfolio de projets Python appliqués à la finance quantitative — analyse de données, indicateurs techniques, backtesting et Machine Learning."
author: "Votre Prénom Nom"
email: volkanisleyen86@email.com
url: "https://volkan9117.github.io"
baseurl: "/quant-backtesting-portfolio"

# --- Langue ---
lang: fr

# --- Thème ---
theme: minima
minima:
  skin: classic

# --- Navigation ---
header_pages:
  - index.md

# --- Liens réseaux sociaux ---
minima:
  social_links:
    - { platform: linkedin, user_url: "https://linkedin.com/in/votre-profil" }
    - { platform: github,   user_url: "https://github.com/votre-username" }

# --- Plugins GitHub Pages ---
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Options de build ---
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

# --- Exclusions ---
exclude:
  - README.md
  - requirements.txt
  - "*.ipynb"
  - .gitignore
  - Gemfile
  - Gemfile.lock
